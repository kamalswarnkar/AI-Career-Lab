{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'career/style.css' %}">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-orb orb-left"></div>
    <div class="bg-orb orb-right"></div>

    <header class="site-header">
        <div class="shell">
            <a class="brand" href="/">
                <span class="brand-mark">AL</span>
                <span class="brand-copy">
                    <strong>AI Career Lab</strong>
                    <small>Career direction, distilled</small>
                </span>
            </a>
            <nav class="site-nav">
                <a href="/">Home</a>
                <a href="/analyze/">Analyze</a>
            </nav>
            <button type="button" class="theme-toggle" aria-label="Toggle dark mode" data-theme-toggle>
                <span class="theme-toggle-track">
                    <span class="theme-toggle-label theme-toggle-light">Light</span>
                    <span class="theme-toggle-label theme-toggle-dark">Dark</span>
                </span>
            </button>
        </div>
    </header>

    <main class="shell page-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="shell">
            <p>Built for smarter career decisions.</p>
        </div>
    </footer>

    <script>
        (function () {
            const root = document.documentElement;
            const button = document.querySelector("[data-theme-toggle]");
            const savedTheme = localStorage.getItem("ai-career-lab-theme");
            const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const initialTheme = savedTheme || (systemPrefersDark ? "dark" : "light");

            root.dataset.theme = initialTheme;

            if (button) {
                button.setAttribute("aria-pressed", initialTheme === "dark" ? "true" : "false");
                button.addEventListener("click", function () {
                    const nextTheme = root.dataset.theme === "dark" ? "light" : "dark";
                    root.dataset.theme = nextTheme;
                    localStorage.setItem("ai-career-lab-theme", nextTheme);
                    button.setAttribute("aria-pressed", nextTheme === "dark" ? "true" : "false");
                });
            }
        })();
    </script>
</body>
</html>
